# ASUS ROG Keyboard LED Configuration
#
# Colors: hex (e.g. "00FF00") or RGB array [R, G, B] (0-255)
# Key names: see README.md for the full list

# Base color for all keys
base: "00FF00"

# Per-key color overrides
# Use key names from the KEY map (e.g. W, A, S, D, ESC, ENTER, SPACE, ...)
keys:
  ENTER: "FF0000"
  LCTRL: "FF0000"
  W: "8000FF"
  A: "8000FF"
  S: "8000FF"
  D: "8000FF"
